# Side projects, in roughly reverse-chronological order.
# Add new projects to the top.
projects:
  - name: Story Theater
    tagline: Read-aloud, choose-your-own-adventure picture books for kids — vibe-coded for my own.
    description: |
      A bedtime experiment that got out of hand. My kids are right around the age (~7–9) where they want to be the
      hero of the story, so I built a little web app where they pick a genre and a hero, then branch through scenes
      with two choices per beat — up to 16 scenes long. Claude generates each scene as structured JSON so the cast,
      choices, and continuity stay coherent. Neural TTS reads each page aloud with sentence-level highlighting, and
      Gemini paints an illustration per scene — keeping the hero recognizable across pages via reference images.
      Backtracking through earlier beats hits a browser cache so it actually feels snappy. Mostly I learned how
      much glue work it takes to make multi-modal AI feel like a picture book instead of a tech demo.
    stack:
      - React 19
      - Vite 8
      - Tailwind CSS 4
      - Anthropic SDK (Claude)
      - Gemini TTS / Image
      - OpenAI TTS
      - Vercel
    status: Live
    links:
      - label: Live app
        url: https://story-theater-for-kids.vercel.app
      - label: GitHub
        url: https://github.com/jqchen24-new/story-theater

  - name: The Offer Lab
    tagline: A lightweight hub for interview prep + application tracking, built during my own job search.
    description: |
      I vibe-coded The Offer Lab when I noticed how fast the open hours of a career transition can disappear.
      It turns the day into doable chunks: suggested study sessions based on what you've practiced least, a tag-based
      progress tracker, an SQL practice module with AI feedback, and a clean place to log applications without the
      spreadsheet chaos. Shipping new features in the open based on real feedback from job seekers.
    stack:
      - Next.js 16
      - TypeScript
      - Tailwind CSS
      - Prisma
      - PostgreSQL
      - NextAuth
      - Recharts
    status: Live & shipping
    links:
      - label: Live app
        url: https://the-offer-lab.vercel.app
      - label: GitHub
        url: https://github.com/jqchen24-new/the_offer_lab
      - label: Launch post
        url: /writing/building-through-transition

  - name: Lending Club Loan Grade Prediction
    tagline: ML Zoomcamp capstone — model + production deployment, end to end.
    description: |
      A multi-class classifier that predicts a loan's risk grade (A–G) from borrower attributes available at
      origination — the same kind of risk-tiering decision used in consumer credit underwriting. I trained Random
      Forest, XGBoost, and a PyTorch MLP on ~500K records, then wrapped the best model in a FastAPI service,
      containerized it with Docker, and deployed the image to Railway. Best model hit 0.95 weighted F1 on a 100K-row
      test set. The training was the easy part — the deployment is where I actually learned things.
    stack:
      - Python
      - scikit-learn
      - XGBoost
      - PyTorch
      - FastAPI
      - Docker
      - Railway
    status: Deployed
    links:
      - label: GitHub
        url: https://github.com/jqchen24-new/lending-club-loan-grade-prediction
      - label: Writeup
        url: /writing/notebook-to-production

